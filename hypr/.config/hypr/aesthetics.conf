# ── General ────────────────────────────────
general {
    border_size         = 2
    gaps_in             = 5
    gaps_out            = 10
    col.active_border   = $mauve $blue 45deg
    col.inactive_border = $surface0
    layout              = dwindle
    resize_on_border    = true
    allow_tearing       = false

    snap {
        enabled        = true
        window_gap     = 10
        border_overlap = false
    }
}

# ── Decoration ─────────────────────────────
decoration {
    rounding         = 10
    rounding_power   = 2.0
    active_opacity   = 1.0
    inactive_opacity = 0.95
    dim_inactive     = true
    dim_strength     = 0.05

    blur {
        enabled    = true
        size       = 4
        passes     = 2
        noise      = 0.02
        contrast   = 1.0
        brightness = 1.0
        vibrancy   = 0.2
        xray       = false
        popups     = true
    }

    shadow {
        enabled      = true
        range        = 12
        render_power = 3
        color        = rgba(1e1e2ecc)   # $crust with alpha
        offset       = 0 4
    }
}

# ── Animations ─────────────────────────────
animations {
    enabled              = true
    workspace_wraparound = false

    bezier = snappy,    0.25, 1,   0.5,  1
    bezier = overshoot, 0.05, 0.9, 0.1,  1.05
    bezier = linear,    0.0,  0.0, 1.0,  1.0

    animation = windows,          1, 4,   overshoot, popin 80%
    animation = windowsOut,       1, 4,   snappy,    popin 80%
    animation = windowsMove,      1, 4,   snappy
    animation = fade,             1, 4,   snappy
    animation = fadeOut,          1, 4,   snappy
    animation = border,           1, 6,   snappy
    animation = borderangle,      1, 180, linear,    loop
    animation = workspaces,       1, 4,   snappy,    slide
    animation = specialWorkspace, 1, 4,   snappy,    slidevert
}

# ── Group ──────────────────────────────────
group {
    col.border_active          = $mauve $blue 45deg
    col.border_inactive        = $surface0
    col.border_locked_active   = $peach $yellow 45deg
    col.border_locked_inactive = $surface1

    groupbar {
        enabled    = true
        font_size  = 11
        gradients  = true
        height     = 22
        text_color = $text
        col.active   = $mauve
        col.inactive = $surface1
    }
}

# ── Render ─────────────────────────────────
render {
    direct_scanout        = 1
    new_render_scheduling = true
}

# ── Cursor ─────────────────────────────────
cursor {
    no_hardware_cursors = 0
    inactive_timeout    = 5
    no_warps            = false
    hide_on_key_press   = false
    enable_hyprcursor   = true
}

# ── Misc ───────────────────────────────────
misc {
    vfr                     = true
    vrr                     = 1
    disable_hyprland_logo   = true
    force_default_wallpaper = 0
    font_family             = "JetBrainsMono Nerd Font"
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
    focus_on_activate       = false
    render_unfocused_fps    = 30
}
