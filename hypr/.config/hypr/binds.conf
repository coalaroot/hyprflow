# ── Bind settings ──────────────────────────
binds {
    workspace_back_and_forth          = false
    focus_preferred_method            = 1
    movefocus_cycles_fullscreen       = false
    window_direction_monitor_fallback = true
}

$mainMod = SUPER

bind = $mainMod, Q, killactive,
bind = $mainMod, X, exec, $terminal ~/flowis/projects
bind = $mainMod, C, exec, google-chrome --enable-features=TouchpadOverscrollHistoryNavigation
bind = $mainMod, O, exec, obs
bind = $mainMod, B, exec, flatpak run com.bambulab.BambuStudio
bind = $mainMod, W, exec, rofi -show drun
bind = $mainMod, T, exec, ticktick
bind = $mainMod, M, exec, [float;size 1000 800;center] kitty pulsemixer
bind = $mainMod, A, exec, code
bind = $mainMod, L, exec, wlogout

bind = $mainMod, U, exec, waypaper
bind = $mainMod, I, exec, hyprctl switchxkblayout all next
bind = $mainMod SHIFT, R, exec, hyprctl reload

bind = $mainMod, E, exec, kitty yazi ~/flowis/projects/hyprflow
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, Z, togglespecialworkspace, magic
bind = $mainMod SHIFT, Z, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, bash -c 'wpctl set-mute @DEFAULT_AUDIO_SINK@ 0 && swayosd-client --output-volume raise'
bindel = ,XF86AudioLowerVolume, exec, bash -c 'wpctl set-mute @DEFAULT_AUDIO_SINK@ 0 && swayosd-client --output-volume lower'
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindl  = ,Caps_Lock, exec, sleep 0.1 && swayosd-client --caps-lock
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


# Screenshot a window
bind = $mainMod, S, exec, hyprshot -m window
# Screenshot a monitor
#bind = , PRINT, exec, hyprshot -m output
# Screenshot a region
bind = $mainMod SHIFT, S, exec, hyprshot -m region

# Notification center
bind = $mainMod, N, exec, swaync-client -t

# Color picker
bind = $mainMod, K, exec, hyprpicker -a
