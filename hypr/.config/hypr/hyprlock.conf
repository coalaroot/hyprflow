# ── Hyprlock — Synthwave 84 ────────────────────────────────────────────────

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 6
    brightness = 0.6
    contrast = 1.0
    vibrancy = 0.2
}

# ── Clock ──────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba(ffade8ff)
    font_size = 80
    font_family = JetBrains Mono Bold
    position = 0, 220
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(100a24cc)
}

# ── Date ───────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B")"
    color = rgba(03edf9cc)
    font_size = 20
    font_family = JetBrains Mono
    position = 0, 130
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(100a24cc)
}

# ── Input field ────────────────────────────────────────────────────────────
input-field {
    monitor =
    size = 320, 52
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(03edf966)
    inner_color = rgba(241b2fee)
    font_color = rgba(ffade8ff)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i><span foreground="##ffade888">password</span></i>
    hide_input = false
    rounding = 12
    check_color = rgba(72f1b8ff)
    fail_color = rgba(fe4450ff)
    fail_text = <i>$PAMFAIL</i>
    capslock_color = rgba(ffd83dff)
    position = 0, -60
    halign = center
    valign = center
}
