# ── Synthwave 84 color palette ─────────────

# Backgrounds
$base    = rgb(100a24)   # very dark bg
$mantle  = rgb(241b2f)   # slightly lighter bg
$crust   = rgb(2a2139)   # darkest

# Surfaces
$surface0 = rgb(2a2139)  # dark surface (inactive borders)
$surface1 = rgb(34294f)  # medium surface
$surface2 = rgb(444251)  # lighter surface

# Text
$text     = rgb(ffade8)  # neon pink foreground
$subtext0 = rgb(dddddd)  # white-ish

# Accents
$orange  = rgb(ff6c11)   # orange (primary accent / active border)
$cyan    = rgb(03edf9)   # bright cyan
$green   = rgb(72f1b8)   # mint green
$pink    = rgb(ff7edb)   # bright magenta/pink
$red     = rgb(fe4450)   # bright red
$yellow  = rgb(ffd83d)   # yellow
$magenta = rgb(b30065)   # deep magenta

# Alpha variants
$shadow_color = rgba(100a24cc)  # base with alpha for shadows
