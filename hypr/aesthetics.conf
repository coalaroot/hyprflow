decoration {
    rounding = 12
    blur {
        enabled = false
        passes = 1
        size = 4
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = linear, 0.0, 0.0, 1.0, 1.0
    bezier = snappy, 0.25, 1, 0.5, 1

    animation = windows, 1, 4, snappy, popin 80%
    animation = windowsOut, 1, 4, snappy, popin 80%
    animation = fade, 1, 4, snappy
    animation = workspaces, 1, 4, snappy, slide
}

misc {
    vfr = true              # Variable frame rate — saves GPU when idle
    vrr = 1                 # Adaptive sync (global fallback)
    disable_hyprland_logo = true
    force_default_wallpaper = 0
}
