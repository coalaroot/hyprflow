# ── Prefix ────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Pane splitting ────────────────────────────
unbind '"'
unbind %
bind \' split-window -h -c "#{pane_current_path}"
bind /   split-window -v -c "#{pane_current_path}"

# ── Pane navigation (Alt + arrows) ───────────
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ── General ───────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:Tc"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 10000

# ── Synthwave 84 theme ───────────────────────
# Colors
base="#100a24"
mantle="#241b2f"
surface0="#2a2139"
surface1="#34294f"
surface2="#444251"
text="#ffade8"
subtext0="#dddddd"
orange="#ff6c11"
cyan="#03edf9"
green="#72f1b8"
pink="#ff7edb"
red="#fe4450"
yellow="#ffd83d"

# Pane borders
set -g pane-border-style "fg=$surface1"
set -g pane-active-border-style "fg=$orange"

# Status bar
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=$mantle,fg=$text"

# Left: session name
set -g status-left-length 30
set -g status-left "#[bg=$orange,fg=$base,bold]  #S #[bg=$mantle,fg=$orange,nobold] "

# Right: date & time
set -g status-right-length 50
set -g status-right "#[fg=$surface2]#[bg=$surface2,fg=$subtext0] %H:%M #[fg=$cyan]#[bg=$cyan,fg=$base,bold] %d-%b "

# Window tabs
set -g window-status-format "#[fg=$surface2,bg=$mantle] #I #[fg=$subtext0]#W "
set -g window-status-current-format "#[fg=$pink,bg=$mantle] #I #[fg=$text,bold]#W "
set -g window-status-separator ""

# Message & command prompt
set -g message-style "bg=$surface1,fg=$cyan"
set -g message-command-style "bg=$surface1,fg=$orange"

# Selection / copy mode
setw -g mode-style "bg=$surface2,fg=$cyan"
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe "wl-copy"
bind -T copy-mode WheelUpPane send-keys -X -N 3 scroll-up
bind -T copy-mode WheelDownPane send-keys -X -N 3 scroll-down
