[opener]

edit = [
  { run = 'code "$@"', desc = "VSCode", block = false, orphan = true },
  { run = "${EDITOR:-vi} %s", desc = "$EDITOR", block = true },
]
open_dir = [
  { run = 'code --new-window %*', desc = "VSCode (new window)", orphan = true },
]
play = [
  { run = "xdg-open %s1", desc = "Play", orphan = true },
  { run = "mediainfo %s1; echo 'Press enter to exit'; read _", desc = "Show media info", block = true },
]
open = [
  { run = "xdg-open %s1", desc = "Open" },
]
reveal = [
  { run = "xdg-open %d1", desc = "Reveal" },
  { run = "clear; exiftool %s1; echo 'Press enter to exit'; read _", desc = "Show EXIF", block = true },
]
extract = [
  { run = "ya pub extract --list %s", desc = "Extract here" },
]
download = [
  { run = "ya emit download --open %S", desc = "Download and open" },
  { run = "ya emit download %S",        desc = "Download" },
]


[open]

rules = [
  # Folder
  { url = "*/", use = [ "open_dir", "reveal" ] },
  # Text / code
  { mime = "text/*", use = [ "edit", "reveal" ] },
  # Image
  { mime = "image/*", use = [ "open", "reveal" ] },
  # Media
  { mime = "{audio,video}/*", use = [ "play", "reveal" ] },
  # Archive
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal" ] },
  # JSON / JS
  { mime = "application/{json,ndjson}", use = [ "edit", "reveal" ] },
  { mime = "*/javascript", use = [ "edit", "reveal" ] },
  # Empty file
  { mime = "inode/empty", use = [ "edit", "reveal" ] },
  # Virtual file system
  { mime = "vfs/{absent,stale}", use = "download" },
  # Fallback
  { url = "*", use = [ "open", "reveal" ] },
]
